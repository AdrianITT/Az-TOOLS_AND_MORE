services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aztools}
      POSTGRES_USER: ${POSTGRES_USER:-aztools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aztools}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aztools}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aztools}:${POSTGRES_PASSWORD:-aztools}@db:5432/${POSTGRES_DB:-aztools}
    volumes:
      - media:/app/media
      - staticfiles:/app/staticfiles
    expose:
      - "8000"

  fibras-sync:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aztools}:${POSTGRES_PASSWORD:-aztools}@db:5432/${POSTGRES_DB:-aztools}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        python manage.py wait_for_db
        while true; do
          echo "[fibras-sync] Sincronizando precios..."
          python manage.py sync_fibras
          echo "[fibras-sync] Listo. Esperando 24h..."
          sleep 86400
        done

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
  media:
  staticfiles:
