server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Límite de subida (herramientas de PDF: proteger, unir, comprimir, etc.).
    # El default de Nginx (1M) rechazaba con 413 antes de que la petición
    # llegara al backend; mantener en sincronía con MAX_UPLOAD_SIZE_MB en el backend.
    client_max_body_size 150M;

    # SPA: cualquier ruta que no sea un archivo real cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Panel de administración Django
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy hacia el backend Django (mismo contrato que el proxy de Vite en dev)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Comprimir/unir PDFs grandes puede tardar más que el default de 60s.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /media/ {
        proxy_pass http://backend:8000/media/;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
    }
}
